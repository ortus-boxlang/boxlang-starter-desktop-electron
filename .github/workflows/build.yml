##############################################################################
# Build & Package — BoxLang Electron Desktop App
#
# Runs on every push to main/develop and on every pull-request targeting main.
# Each platform (macOS, Windows, Linux) builds in its own runner so that
# native toolchains are available for code-signing and packaging.
##############################################################################
name: Build and Package

on:
  push:
    branches:
      - main
      - master
      - development

  # Manual Trigger
  workflow_dispatch:

# Restrict default token permissions across all jobs
permissions:
  contents: read

# Define environment variables available to all jobs
env:
  MODULE_ID: ${{ github.event.repository.name }}
  JDK: 21
  BUILD_ID: ${{ github.run_number }}

jobs:
  ##########################################################################
  # macOS build — produces a .dmg installer
  ##########################################################################
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "npm"

      - name: Setup BoxLang
        uses: ortus-boxlang/setup-boxlang@main
        with:
          with-commandbox: true

      - name: Install dependencies
        run: |
          npm ci
          box install

      - name: Package BoxLang MiniServer
        run: npm run package:miniserver

      - name: Build Vite Assets
        run: npm run build

      - name: Package Electron app (macOS)
        run: npm run package:mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: electron-app-macos
          path: |
            dist/electron/**/*.dmg
            dist/electron/**/*.zip
          retention-days: 7

  ##########################################################################
  # Windows build — produces a Squirrel installer (.exe)
  ##########################################################################
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          # Node 22+ removed fs.rmdir({recursive:true}) which cross-zip (used by
          # @electron-forge/maker-zip) still relies on. Pin to Node 20 LTS until
          # cross-zip ships a patched release.
          node-version: "20"
          cache: "npm"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # setup-boxlang action does not support Windows — install manually
      - name: Install BoxLang (Windows)
        shell: powershell
        run: |
          iex ((New-Object System.Net.WebClient).DownloadString('https://install-windows.boxlang.io'))
          Add-Content -Path $env:GITHUB_PATH -Value "C:\BoxLang\bin"

      - name: Install CommandBox (Windows)
        shell: powershell
        run: choco install commandbox -y

      - name: Install dependencies
        run: |
          npm ci
          box install

      - name: Package BoxLang MiniServer
        run: npm run package:miniserver

      - name: Build Vite assets
        run: npm run build

      - name: Package Electron app (Windows)
        run: npm run package:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: electron-app-windows
          path: dist/electron/**/*.exe
          retention-days: 7

  ##########################################################################
  # Linux build — produces .deb (Debian/Ubuntu) and .rpm (RHEL/Fedora)
  # Electron Forge does not ship an official AppImage maker; deb+rpm
  # covers the most common Linux distributions.
  ##########################################################################
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "npm"

      - name: Setup BoxLang
        uses: ortus-boxlang/setup-boxlang@main
        with:
          with-commandbox: true

      - name: Install Linux packaging tools
        run: |
          sudo apt-get install -y dpkg rpm elfutils flatpak flatpak-builder
          flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install dependencies
        run: |
          npm ci
          box install

      - name: Package BoxLang MiniServer
        run: npm run package:miniserver

      - name: Build Vite assets
        run: npm run build

      - name: Package Electron app (Linux)
        run: npm run package:linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: electron-app-linux
          path: |
            dist/electron/**/*.deb
            dist/electron/**/*.rpm
            dist/electron/**/*.flatpak
          retention-days: 7
